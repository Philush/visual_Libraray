version: '3.9'

# Локальная инфраструктура для разработки.
# Frontend и Backend запускаются нативно через pnpm dev.
# Только PostgreSQL запускается через Docker.

services:
  postgres:
    image: postgres:17-alpine
    container_name: visual_library_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visual_library
    ports:
      # Порт доступен с хоста для Prisma Studio и прямых подключений
      - '5432:5432'
    volumes:
      # Именованный volume для сохранения данных между перезапусками
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d visual_library']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
